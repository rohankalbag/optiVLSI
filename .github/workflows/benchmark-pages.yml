name: Benchmark Report

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 0 * * 0"  # Weekly on Sunday midnight
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run benchmarks
        run: |
          pytest tests/test_benchmarks.py --benchmark-json=benchmark_data.json -v
      - name: Generate HTML report
        run: |
          python scripts/generate_benchmark_report.py benchmark_data.json docs/benchmark_report.html
      - name: Clean up benchmark data
        run: rm benchmark_data.json
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/
  deploy:
    needs: benchmark
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4